<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyShop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f3f3f3;
    }

    /* Navbar */
    .navbar {
      background-color: #131921;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .search-box input {
      padding: 8px;
      width: 300px;
      border: none;
      border-radius: 4px;
    }

    .menu {
      display: flex;
      gap: 15px;
    }

    /* Hero Section */
    .hero {
      background: url('https://via.placeholder.com/1500x400') no-repeat center;
      background-size: cover;
      height: 300px;
    }

    /* Product Section */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 5px;
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .product h3 {
      font-size: 16px;
    }

    .product button {
      background-color: #ffa41c;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    /* Footer */
    .footer {
      background-color: #131921;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">MyShop</div>
    <div class="search-box">
      <input type="text" placeholder="Search products...">
    </div>
    <div class="menu">
      <div>Account</div>
      <div>Orders</div>
      <div>Cart</div>
    </div>
  </div>

  <!-- Hero Banner -->
  <div class="hero"></div>

  <!-- Products -->
  <div class="products">
    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 1</h3>
      <p>$19.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 2</h3>
      <p>$29.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 3</h3>
      <p>$39.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 4</h3>
      <p>$49.99</p>
      <button>Add to Cart</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 MyShop. All rights reserved.
  </div>
<button onclick="addToCart(this)" data-name="Product 1" data-price="19.99">
  Add to Cart
</button>
<div>Cart (<span id="cart-count">0</span>)</div>
<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function updateCartCount() {
    document.getElementById("cart-count").innerText = cart.length;
  }

  function addToCart(button) {
    const product = {
      name: button.getAttribute("data-name"),
      price: button.getAttribute("data-price")
    };

    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();
    alert(product.name + " added to cart!");
  }

  // Load cart count on page load
  updateCartCount();
</script>
</body>
</html>
